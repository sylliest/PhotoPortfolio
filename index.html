<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Photo Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@700;800&family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --navy:       #0B0B5C;
    --navy-dark:  #07073D;
    --cream:      #F4F0E6;
    --blue:       #1A1AE0;
    --blue-bright:#2525F5;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--navy);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    color: var(--cream);
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: repeating-linear-gradient(
      -55deg, transparent, transparent 18px,
      rgba(255,255,255,0.025) 18px, rgba(255,255,255,0.025) 20px
    );
    pointer-events: none; z-index: 0;
  }

  /* HEADER */
  header {
    position: relative; z-index: 10;
    background: var(--cream);
    padding: 48px 60px 40px;
    display: flex; align-items: flex-end;
    justify-content: space-between; gap: 32px; flex-wrap: wrap;
  }

  .header-left h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(64px, 10vw, 120px);
    line-height: 0.9; color: var(--blue); letter-spacing: 2px;
  }

  .header-left p {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 16px; color: var(--navy);
    max-width: 400px; margin-top: 14px; line-height: 1.5;
  }

  .header-actions { display: flex; gap: 12px; align-items: center; flex-shrink: 0; }

  .lock-btn {
    background: none;
    border: 2.5px solid var(--navy);
    color: var(--navy);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px; letter-spacing: 1px;
    padding: 10px 18px; cursor: pointer;
    transition: all 0.15s; display: flex; align-items: center; gap: 8px;
  }
  .lock-btn:hover { background: var(--navy); color: var(--cream); }
  .lock-btn.unlocked { background: var(--navy); color: var(--cream); border-color: var(--navy); }

  .add-btn {
    background: var(--blue); color: #fff; border: none;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px; letter-spacing: 2px;
    padding: 14px 36px; cursor: pointer;
    transition: background 0.15s, transform 0.12s;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    display: none;
  }
  .add-btn:hover { background: var(--navy); transform: translateY(-2px); }

  /* FILTER BAR */
  .filter-bar {
    position: relative; z-index: 10;
    background: var(--navy-dark);
    padding: 20px 60px;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    border-top: 4px solid var(--blue); border-bottom: 4px solid var(--blue);
  }

  .filter-label-title {
    font-family: 'Bebas Neue', sans-serif; font-size: 20px;
    color: var(--cream); opacity: 0.5; letter-spacing: 2px;
    margin-right: 8px; flex-shrink: 0;
  }

  /* All pills: same blue, no custom colors */
  .tag-pill {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800; font-size: 14px; letter-spacing: 1.5px; text-transform: uppercase;
    padding: 6px 18px;
    border: 2.5px solid rgba(100,100,255,0.45);
    background: transparent; color: rgba(255,255,255,0.65);
    cursor: pointer; border-radius: 2px; transition: all 0.15s;
  }
  .tag-pill:hover {
    background: var(--blue-bright); border-color: var(--blue-bright);
    color: #fff; transform: translateY(-1px);
  }
  .tag-pill.active {
    background: var(--blue); border-color: var(--blue); color: #fff;
  }

  .manage-labels-btn {
    background: none; border: 2px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.5);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800; font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
    padding: 5px 14px; cursor: pointer; transition: all 0.15s;
    margin-left: auto; flex-shrink: 0; display: none;
  }
  .manage-labels-btn:hover { border-color: rgba(255,255,255,0.5); color: #fff; }

  /* GALLERY */
  main { position: relative; z-index: 10; padding: 48px 60px; }

  .gallery-count {
    font-family: 'Bebas Neue', sans-serif; font-size: 18px;
    color: rgba(255,255,255,0.3); letter-spacing: 3px; margin-bottom: 28px;
  }

  .gallery-grid { columns: 3 320px; column-gap: 20px; }

  .gallery-item {
    background: var(--cream); break-inside: avoid; margin-bottom: 20px;
    cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
    position: relative; overflow: hidden;
  }
  .gallery-item:hover {
    transform: translateY(-4px) rotate(-0.5deg);
    box-shadow: 8px 8px 0 var(--blue-bright); z-index: 2;
  }
  .gallery-item img { display: block; width: 100%; object-fit: cover; }

  .gallery-item-info { padding: 16px 18px 20px; }

  .gallery-item-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }

  /* Item tags: uniform blue */
  .item-tag {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 800;
    font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
    padding: 3px 10px; border-radius: 1px;
    background: var(--blue); color: #fff;
  }

  .gallery-item-title {
    font-family: 'Bebas Neue', sans-serif; font-size: 22px;
    color: var(--blue); letter-spacing: 1px; margin-bottom: 4px;
  }
  .gallery-item-desc {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
    font-size: 15px; color: var(--navy); line-height: 1.4;
  }

  .delete-btn {
    position: absolute; top: 8px; right: 8px;
    background: rgba(10,10,80,0.88); color: #fff; border: none;
    font-size: 11px; font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800; letter-spacing: 1px; padding: 5px 10px;
    cursor: pointer; opacity: 0; transition: opacity 0.15s; border-radius: 1px;
    display: none;
  }
  .gallery-item:hover .delete-btn { opacity: 1; }

  .empty-state { text-align: center; padding: 80px 20px; color: rgba(255,255,255,0.2); }
  .empty-state h2 { font-family: 'Bebas Neue', sans-serif; font-size: 64px; letter-spacing: 3px; margin-bottom: 12px; }
  .empty-state p { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 18px; letter-spacing: 1px; }

  /* MODALS */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(7,7,61,0.92); z-index: 1000;
    align-items: center; justify-content: center;
    padding: 20px; backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--cream); width: 100%; max-width: 560px;
    position: relative; animation: slideUp 0.25s ease;
    max-height: 90vh; overflow-y: auto;
  }

  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  .modal-header {
    background: var(--blue); padding: 20px 28px;
    display: flex; justify-content: space-between; align-items: center;
    position: sticky; top: 0; z-index: 1;
  }
  .modal-header h2 { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: #fff; letter-spacing: 2px; }
  .modal-close {
    background: none; border: 2px solid rgba(255,255,255,0.4); color: #fff;
    font-family: 'Bebas Neue', sans-serif; font-size: 20px;
    width: 36px; height: 36px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.15s; flex-shrink: 0;
  }
  .modal-close:hover { border-color: #fff; }

  .modal-body { padding: 28px; display: flex; flex-direction: column; gap: 20px; }

  .form-group { display: flex; flex-direction: column; gap: 8px; }
  .form-group label {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 800;
    font-size: 13px; letter-spacing: 2px; text-transform: uppercase; color: var(--navy);
  }
  .form-group input,
  .form-group textarea {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
    font-size: 16px; color: var(--navy);
    border: 2.5px solid var(--navy); background: #fff;
    padding: 10px 14px; outline: none; transition: border-color 0.15s; width: 100%;
  }
  .form-group input:focus,
  .form-group textarea:focus { border-color: var(--blue-bright); }
  .form-group textarea { resize: vertical; min-height: 80px; }

  .img-preview { width: 100%; max-height: 180px; object-fit: cover; display: none; border: 2px solid var(--navy); margin-top: 8px; }

  .upload-zone {
    border: 3px dashed var(--navy); background: #fff;
    text-align: center; padding: 24px; cursor: pointer;
    transition: border-color 0.15s, background 0.15s; position: relative;
  }
  .upload-zone:hover, .upload-zone.drag-over { border-color: var(--blue-bright); background: #f0f0ff; }
  .upload-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-zone-icon { font-size: 32px; margin-bottom: 6px; display: block; }
  .upload-zone p { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 14px; color: var(--navy); letter-spacing: 1px; }
  .upload-zone p strong { color: var(--blue); }

  .tag-input-wrapper {
    display: flex; gap: 8px; flex-wrap: wrap;
    border: 2.5px solid var(--navy); background: #fff;
    padding: 8px 10px; min-height: 48px; align-items: center; cursor: text;
  }
  .tag-chip {
    display: flex; align-items: center; gap: 5px;
    font-family: 'Barlow Condensed', sans-serif; font-weight: 800;
    font-size: 13px; letter-spacing: 1px; text-transform: uppercase;
    padding: 3px 10px; color: #fff; border-radius: 1px; background: var(--blue);
  }
  .remove-tag { background: none; border: none; color: rgba(255,255,255,0.7); cursor: pointer; font-size: 14px; line-height: 1; padding: 0; }

  #tag-text-input {
    border: none; outline: none;
    font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
    font-size: 15px; color: var(--navy); background: transparent; flex: 1; min-width: 80px;
  }

  #tagSuggestions { display: none; background: #fff; border: 2px solid var(--navy); border-top: none; max-height: 120px; overflow-y: auto; }
  .suggestion-row { padding: 8px 14px; cursor: pointer; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 15px; color: var(--navy); border-bottom: 1px solid #eee; }
  .suggestion-row:hover { background: #eeeeff; }

  .modal-footer {
    padding: 0 28px 28px; display: flex; gap: 12px; justify-content: flex-end;
  }
  .btn-cancel {
    font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1.5px;
    padding: 10px 28px; background: transparent;
    border: 2.5px solid var(--navy); color: var(--navy); cursor: pointer; transition: all 0.15s;
  }
  .btn-cancel:hover { background: var(--navy); color: #fff; }
  .btn-save {
    font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1.5px;
    padding: 10px 36px; background: var(--blue);
    border: 2.5px solid var(--blue); color: #fff; cursor: pointer; transition: all 0.15s;
    clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
  }
  .btn-save:hover { background: var(--navy); border-color: var(--navy); }

  .pw-hint { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; color: #c00; font-weight: 800; letter-spacing: 1px; display: none; }

  /* LIGHTBOX */
  .lightbox {
    display: none; position: fixed; inset: 0;
    background: rgba(7,7,61,0.97); z-index: 2000;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 20px; padding: 30px;
  }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 90vw; max-height: 70vh; object-fit: contain; border: 4px solid var(--cream); box-shadow: 0 0 60px rgba(26,26,224,0.4); animation: zoomIn 0.2s ease; }
  @keyframes zoomIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .lightbox-info { text-align: center; max-width: 600px; }
  .lightbox-title { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: var(--cream); letter-spacing: 2px; }
  .lightbox-desc { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 16px; color: rgba(255,255,255,0.6); margin-top: 6px; }
  .lightbox-tags { display: flex; gap: 8px; justify-content: center; margin-top: 10px; flex-wrap: wrap; }
  .lightbox-close { position: fixed; top: 20px; right: 24px; font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--cream); background: none; border: 2px solid rgba(255,255,255,0.3); padding: 4px 14px; cursor: pointer; letter-spacing: 2px; transition: border-color 0.15s; }
  .lightbox-close:hover { border-color: #fff; }

  #existingLabelsList { display: flex; flex-wrap: wrap; gap: 8px; min-height: 40px; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--navy-dark); }
  ::-webkit-scrollbar-thumb { background: var(--blue); border-radius: 3px; }

  @media (max-width: 700px) {
    header, .filter-bar, main { padding-left: 20px; padding-right: 20px; }
    .gallery-grid { columns: 1; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>MY<br>GALLERY</h1>
    <p>I approach each project with care and creativity, balancing experimentation with clear communication to turn ideas into strong visual systems.</p>
  </div>
  <div class="header-actions">
    <button class="lock-btn" id="lockBtn" onclick="toggleAdmin()" title="Admin login">
      <span id="lockIcon">🔒</span>
      <span id="lockLabel">ADMIN</span>
    </button>
    <button class="add-btn" id="addBtn" onclick="openModal()">+ ADD IMAGE</button>
  </div>
</header>

<div class="filter-bar" id="filterBar">
  <span class="filter-label-title">FILTER:</span>
  <button class="manage-labels-btn" id="manageLabelsBtn" onclick="openLabelManager()">⚙ MANAGE LABELS</button>
</div>

<main>
  <div class="gallery-count" id="galleryCount">0 IMAGES</div>
  <div class="gallery-grid" id="galleryGrid"></div>
</main>

<!-- PASSWORD MODAL -->
<div class="modal-overlay" id="pwModal" onclick="if(event.target.id==='pwModal')closePwModal()">
  <div class="modal" style="max-width:400px">
    <div class="modal-header">
      <h2>ADMIN LOGIN</h2>
      <button class="modal-close" onclick="closePwModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="pwInput" placeholder="Enter admin password…" onkeydown="if(event.key==='Enter')checkPassword()" />
      </div>
      <p class="pw-hint" id="pwHint">✕ Incorrect password — try again.</p>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closePwModal()">CANCEL</button>
      <button class="btn-save" onclick="checkPassword()">UNLOCK</button>
    </div>
  </div>
</div>

<!-- ADD IMAGE MODAL -->
<div class="modal-overlay" id="modal" onclick="if(event.target.id==='modal')closeModal()">
  <div class="modal">
    <div class="modal-header">
      <h2>ADD NEW IMAGE</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Upload Image File</label>
        <div class="upload-zone" id="uploadZone">
          <input type="file" accept="image/*" onchange="handleFileUpload(event)" />
          <span class="upload-zone-icon">📷</span>
          <p><strong>Click to upload</strong> or drag & drop</p>
        </div>
        <img class="img-preview" id="imgPreview" src="" alt="preview" />
      </div>
      <div class="form-group">
        <label>Or paste Image URL</label>
        <input type="url" id="imgUrl" placeholder="https://…" oninput="handleUrlInput(this.value)" />
      </div>
      <div class="form-group">
        <label>Title</label>
        <input type="text" id="imgTitle" placeholder="e.g. Project Gimsel" />
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="imgDesc" placeholder="A short description of this image…"></textarea>
      </div>
      <div class="form-group">
        <label>Labels — press Enter or comma to add</label>
        <div class="tag-input-wrapper" id="tagWrapper" onclick="document.getElementById('tag-text-input').focus()">
          <input id="tag-text-input" placeholder="Type a label…" onkeydown="handleTagInput(event)" oninput="showTagSuggestions(this.value)" />
        </div>
        <div id="tagSuggestions"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">CANCEL</button>
      <button class="btn-save" onclick="saveImage()">SAVE IMAGE</button>
    </div>
  </div>
</div>

<!-- LABEL MANAGER -->
<div class="modal-overlay" id="labelModal" onclick="if(event.target.id==='labelModal')closeLabelManager()">
  <div class="modal" style="max-width:460px">
    <div class="modal-header">
      <h2>MANAGE LABELS</h2>
      <button class="modal-close" onclick="closeLabelManager()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Add New Label</label>
        <input type="text" id="newLabelName" placeholder="Label name…" onkeydown="if(event.key==='Enter')addLabel()" />
      </div>
      <button class="btn-save" style="width:100%;text-align:center" onclick="addLabel()">+ ADD LABEL</button>
      <div class="form-group" style="margin-top:4px">
        <label>Current Labels — click × to delete</label>
        <div id="existingLabelsList"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-save" onclick="closeLabelManager()">DONE</button>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">CLOSE ✕</button>
  <img id="lightboxImg" src="" alt="" onclick="event.stopPropagation()" />
  <div class="lightbox-info">
    <div class="lightbox-title" id="lightboxTitle"></div>
    <div class="lightbox-desc"  id="lightboxDesc"></div>
    <div class="lightbox-tags"  id="lightboxTags"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
//  ★  SET YOUR PASSWORD BELOW  ★
// ══════════════════════════════════════════
const ADMIN_PASSWORD = 'mypassword123';
// ══════════════════════════════════════════

let images  = JSON.parse(localStorage.getItem('gal_images') || '[]');
let labels  = JSON.parse(localStorage.getItem('gal_labels') || JSON.stringify(['Design','Photo','Motion','Branding']));
let adminMode     = false;
let currentFilter = 'all';
let currentTags   = [];
let currentFile   = null;

function persist() {
  localStorage.setItem('gal_images', JSON.stringify(images));
  localStorage.setItem('gal_labels', JSON.stringify(labels));
}

// ── ADMIN ──────────────────────────────────
function toggleAdmin() {
  if (adminMode) { adminMode = false; applyAdminUI(); return; }
  document.getElementById('pwInput').value = '';
  document.getElementById('pwHint').style.display = 'none';
  document.getElementById('pwModal').classList.add('open');
  setTimeout(() => document.getElementById('pwInput').focus(), 80);
}

function checkPassword() {
  if (document.getElementById('pwInput').value === ADMIN_PASSWORD) {
    adminMode = true; closePwModal(); applyAdminUI();
  } else {
    document.getElementById('pwHint').style.display = 'block';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
}

function closePwModal() { document.getElementById('pwModal').classList.remove('open'); }

function applyAdminUI() {
  document.getElementById('addBtn').style.display          = adminMode ? 'block' : 'none';
  document.getElementById('manageLabelsBtn').style.display = adminMode ? 'block' : 'none';
  document.getElementById('lockIcon').textContent          = adminMode ? '🔓' : '🔒';
  document.getElementById('lockLabel').textContent         = adminMode ? 'LOG OUT' : 'ADMIN';
  document.getElementById('lockBtn').classList.toggle('unlocked', adminMode);
  document.querySelectorAll('.delete-btn').forEach(b => b.style.display = adminMode ? 'block' : 'none');
}

// ── RENDER ──────────────────────────────────
function render() {
  const grid = document.getElementById('galleryGrid');
  const filtered = currentFilter === 'all'
    ? images
    : images.filter(img => (img.tags || []).map(t => t.toLowerCase()).includes(currentFilter.toLowerCase()));

  document.getElementById('galleryCount').textContent = `${filtered.length} IMAGE${filtered.length !== 1 ? 'S' : ''}`;
  grid.innerHTML = '';

  if (!filtered.length) {
    grid.innerHTML = `<div class="empty-state"><h2>NO IMAGES</h2><p>${
      currentFilter === 'all'
        ? (adminMode ? 'Hit "+ ADD IMAGE" to get started.' : 'No images have been added yet.')
        : `No images labelled "${currentFilter}".`
    }</p></div>`;
    return;
  }

  filtered.forEach(img => {
    const realIdx = images.indexOf(img);
    const tagsHtml = (img.tags || []).map(t => `<span class="item-tag">${t}</span>`).join('');
    const el = document.createElement('div');
    el.className = 'gallery-item';
    el.innerHTML = `
      <img src="${img.src}" alt="${img.title || ''}" loading="lazy" onclick="openLightbox(${realIdx})" />
      <div class="gallery-item-info">
        ${tagsHtml ? `<div class="gallery-item-tags">${tagsHtml}</div>` : ''}
        ${img.title ? `<div class="gallery-item-title">${img.title}</div>` : ''}
        ${img.desc  ? `<div class="gallery-item-desc">${img.desc}</div>` : ''}
      </div>
      <button class="delete-btn" style="display:${adminMode ? 'block' : 'none'}" onclick="deleteImage(${realIdx},event)">✕ REMOVE</button>
    `;
    grid.appendChild(el);
  });
}

function renderFilters() {
  const bar = document.getElementById('filterBar');
  bar.querySelectorAll('.tag-pill').forEach(p => p.remove());
  const manageBtn = document.getElementById('manageLabelsBtn');

  function makeBtn(text, filterKey) {
    const btn = document.createElement('button');
    btn.className = 'tag-pill' + (currentFilter === filterKey ? ' active' : '');
    btn.textContent = text;
    btn.onclick = () => { currentFilter = filterKey; renderFilters(); render(); };
    bar.insertBefore(btn, manageBtn);
    return btn;
  }

  makeBtn('ALL', 'all');
  labels.forEach(l => makeBtn(l.toUpperCase(), l));
}

// ── ADD IMAGE MODAL ───────────────────────
function openModal() {
  currentTags = []; currentFile = null;
  ['imgUrl','imgTitle','imgDesc'].forEach(id => document.getElementById(id).value = '');
  const prev = document.getElementById('imgPreview');
  prev.style.display = 'none'; prev.src = '';
  renderTagChips();
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }

function handleFileUpload(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    currentFile = ev.target.result;
    const prev = document.getElementById('imgPreview');
    prev.src = currentFile; prev.style.display = 'block';
    document.getElementById('imgUrl').value = '';
  };
  reader.readAsDataURL(file);
}

function handleUrlInput(val) {
  if (!val) return; currentFile = null;
  const prev = document.getElementById('imgPreview');
  prev.src = val; prev.style.display = 'block';
}

// ── TAGS ─────────────────────────────────
function renderTagChips() {
  const wrapper = document.getElementById('tagWrapper');
  const input   = document.getElementById('tag-text-input');
  wrapper.querySelectorAll('.tag-chip').forEach(c => c.remove());
  currentTags.forEach((tag, i) => {
    const chip = document.createElement('span');
    chip.className = 'tag-chip';
    chip.innerHTML = `${tag} <button class="remove-tag" onclick="removeTag(${i})">×</button>`;
    wrapper.insertBefore(chip, input);
  });
}

function addTag(name) {
  name = name.trim(); if (!name || currentTags.includes(name)) return;
  currentTags.push(name);
  if (!labels.find(l => l.toLowerCase() === name.toLowerCase())) {
    labels.push(name); persist(); renderFilters();
  }
  renderTagChips();
}

function removeTag(i) { currentTags.splice(i, 1); renderTagChips(); }

function handleTagInput(e) {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    addTag(e.target.value.replace(',','').trim());
    e.target.value = ''; hideSuggestions();
  } else if (e.key === 'Backspace' && !e.target.value && currentTags.length) {
    currentTags.pop(); renderTagChips();
  }
}

function showTagSuggestions(val) {
  const box = document.getElementById('tagSuggestions');
  if (!val.trim()) { hideSuggestions(); return; }
  const matches = labels.filter(l => l.toLowerCase().startsWith(val.toLowerCase()) && !currentTags.includes(l));
  if (!matches.length) { hideSuggestions(); return; }
  box.style.display = 'block';
  box.innerHTML = matches.map(l =>
    `<div class="suggestion-row" onmousedown="addTag('${l}');document.getElementById('tag-text-input').value='';hideSuggestions()">${l}</div>`
  ).join('');
}
function hideSuggestions() { document.getElementById('tagSuggestions').style.display = 'none'; }

function saveImage() {
  const extra = document.getElementById('tag-text-input').value.trim();
  if (extra) addTag(extra);
  const src   = currentFile || document.getElementById('imgUrl').value.trim();
  const title = document.getElementById('imgTitle').value.trim();
  const desc  = document.getElementById('imgDesc').value.trim();
  if (!src) { alert('Please provide an image file or URL.'); return; }
  images.unshift({ src, title, desc, tags: [...currentTags] });
  persist(); renderFilters(); render(); closeModal();
}

// ── DELETE ────────────────────────────────
function deleteImage(idx, e) {
  e.stopPropagation(); if (!adminMode) return;
  if (!confirm('Remove this image?')) return;
  images.splice(idx, 1); persist(); render();
}

// ── LIGHTBOX ─────────────────────────────
function openLightbox(idx) {
  const img = images[idx];
  document.getElementById('lightboxImg').src           = img.src;
  document.getElementById('lightboxTitle').textContent = img.title || '';
  document.getElementById('lightboxDesc').textContent  = img.desc  || '';
  document.getElementById('lightboxTags').innerHTML    = (img.tags||[]).map(t=>`<span class="item-tag">${t}</span>`).join('');
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }

// ── LABEL MANAGER ────────────────────────
function openLabelManager() {
  renderExistingLabels();
  document.getElementById('labelModal').classList.add('open');
}
function closeLabelManager() {
  document.getElementById('labelModal').classList.remove('open');
  renderFilters(); render();
}

function addLabel() {
  const name = document.getElementById('newLabelName').value.trim();
  if (!name) return;
  if (labels.find(l => l.toLowerCase() === name.toLowerCase())) { alert('Label already exists.'); return; }
  labels.push(name); persist(); document.getElementById('newLabelName').value = '';
  renderExistingLabels(); renderFilters();
}

function removeLabel(idx) {
  const name = labels[idx];
  if (!confirm(`Delete label "${name}"? It will be removed from all images.`)) return;
  labels.splice(idx, 1);
  images.forEach(img => { if (img.tags) img.tags = img.tags.filter(t => t !== name); });
  persist(); renderExistingLabels(); renderFilters(); render();
}

function renderExistingLabels() {
  document.getElementById('existingLabelsList').innerHTML = labels.length
    ? labels.map((l, i) => `<span class="tag-chip">${l}<button class="remove-tag" onclick="removeLabel(${i})">×</button></span>`).join('')
    : '<span style="font-family:\'Barlow Condensed\',sans-serif;font-weight:700;color:#999;font-size:14px">No labels yet.</span>';
}

// ── DRAG & DROP on upload ─────────────────
const uz = document.getElementById('uploadZone');
uz.addEventListener('dragover',  e => { e.preventDefault(); uz.classList.add('drag-over'); });
uz.addEventListener('dragleave', () => uz.classList.remove('drag-over'));
uz.addEventListener('drop', e => {
  e.preventDefault(); uz.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) {
    const r = new FileReader();
    r.onload = ev => {
      currentFile = ev.target.result;
      const prev = document.getElementById('imgPreview');
      prev.src = currentFile; prev.style.display = 'block';
    };
    r.readAsDataURL(file);
  }
});

// ── KEYBOARD ─────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeLightbox(); closeModal(); closeLabelManager(); closePwModal(); }
});

// ── INIT ──────────────────────────────────
renderFilters();
render();
</script>
</body>
</html>
